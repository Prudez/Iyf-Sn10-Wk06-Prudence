<!DOCTYPE html>
<html>
<head>
    <title>Create Post</title>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        form {
            margin-bottom: 20px;
        }

        input, textarea {
            display: block;
            margin: 10px 0;
            padding: 8px;
            width: 300px;
        }

        button {
            padding: 10px;
            cursor: pointer;
        }

        #result {
            border: 1px solid #ccc;
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<h1>Create a Post</h1>

<form id="postForm">
    <input type="text" id="title" placeholder="Title" required />
    <textarea id="body" placeholder="Post content" required></textarea>
    <input type="number" id="userId" placeholder="User ID" required />
    <button type="submit">Create Post</button>
</form>

<div id="loading" style="display:none;">Submitting...</div>
<div id="error" style="color:red;"></div>
<div id="result"></div>

<script>
// Create post function
async function createPost(title, body, userId) {
    const response = await fetch("https://jsonplaceholder.typicode.com/posts", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            title,
            body,
            userId
        })
    });

    if (!response.ok) {
        throw new Error("Failed to create post");
    }

    return response.json();
}

// DOM elements
const form = document.getElementById("postForm");
const loading = document.getElementById("loading");
const errorDiv = document.getElementById("error");
const resultDiv = document.getElementById("result");

// Handle form submit
form.addEventListener("submit", async (e) => {
    e.preventDefault(); // prevent page reload

    // Get input values
    const title = document.getElementById("title").value;
    const body = document.getElementById("body").value;
    const userId = document.getElementById("userId").value;

    try {
        // Show loading
        loading.style.display = "block";
        errorDiv.textContent = "";
        resultDiv.innerHTML = "";

        // Call API
        const newPost = await createPost(title, body, userId);

        // Display result
        resultDiv.innerHTML = `
            <h2>Post Created ✅</h2>
            <p><strong>ID:</strong> ${newPost.id}</p>
            <p><strong>Title:</strong> ${newPost.title}</p>
            <p><strong>Body:</strong> ${newPost.body}</p>
            <p><strong>User ID:</strong> ${newPost.userId}</p>
        `;

        form.reset(); // clear form

    } catch (error) {
        errorDiv.textContent = "Error: " + error.message;
    } finally {
        loading.style.display = "none";
    }
});
</script>

</body>
</html>
