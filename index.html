<!DOCTYPE html>
<html>
<head>
    <title>User Directory - Search & Filter</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .user-card { border: 1px solid #ccc; padding: 10px; border-radius: 6px; margin: 10px 0; }
        .controls { margin-bottom: 20px; }
        label { margin-right: 10px; }
        select, input { margin-right: 15px; padding: 5px; }
        #error { color: red; }
    </style>
</head>
<body>

<h1>User Directory - Search & Filter</h1>

<div class="controls">
    <label>Search: <input type="text" id="search" placeholder="Name or Email"></label>
    <label>Sort by Name:
        <select id="sort">
            <option value="asc">A → Z</option>
            <option value="desc">Z → A</option>
        </select>
    </label>
    <label>Filter by City:
        <select id="cityFilter">
            <option value="">All</option>
        </select>
    </label>
</div>

<div id="loading">Loading users...</div>
<div id="error" class="hidden"></div>
<div id="users-container"></div>

<script>
let allUsers = [];

async function fetchUsers() {
    try {
        const response = await fetch("https://jsonplaceholder.typicode.com/users");
        if (!response.ok) throw new Error("Failed to fetch users");
        return await response.json();
    } catch (error) {
        document.getElementById("error").textContent = error.message;
        document.getElementById("error").classList.remove("hidden");
        return [];
    }
}

function displayUsers(users) {
    const container = document.getElementById("users-container");
    if (users.length === 0) {
        container.innerHTML = "<p>No users found</p>";
        return;
    }

    container.innerHTML = users.map(user => `
        <div class="user-card">
            <h3>${user.name}</h3>
            <p>📧 ${user.email}</p>
            <p>🏢 ${user.company.name}</p>
            <p>📍 ${user.address.city}</p>
        </div>
    `).join("");
}

// Populate city dropdown
function populateCities(users) {
    const cityFilter = document.getElementById("cityFilter");
    const cities = [...new Set(users.map(u => u.address.city))].sort();
    cities.forEach(city => {
        const option = document.createElement("option");
        option.value = city;
        option.textContent = city;
        cityFilter.appendChild(option);
    });
}

// Apply search, sort, filter
function applyFilters() {
    const searchInput = document.getElementById("search").value.toLowerCase();
    const sortOrder = document.getElementById("sort").value;
    const city = document.getElementById("cityFilter").value;

    let filtered = allUsers.filter(user => 
        user.name.toLowerCase().includes(searchInput) ||
        user.email.toLowerCase().includes(searchInput)
    );

    if (city) {
        filtered = filtered.filter(user => user.address.city === city);
    }

    filtered.sort((a, b) => {
        if (a.name < b.name) return sortOrder === "asc" ? -1 : 1;
        if (a.name > b.name) return sortOrder === "asc" ? 1 : -1;
        return 0;
    });

    displayUsers(filtered);
}

// Initialize everything
async function init() {
    const loading = document.getElementById("loading");
    loading.classList.remove("hidden");

    allUsers = await fetchUsers();
    populateCities(allUsers);
    displayUsers(allUsers);

    loading.classList.add("hidden");

    // Event listeners
    document.getElementById("search").addEventListener("input", applyFilters);
    document.getElementById("sort").addEventListener("change", applyFilters);
    document.getElementById("cityFilter").addEventListener("change", applyFilters);
}

init();
</script>

</body>
</html>
